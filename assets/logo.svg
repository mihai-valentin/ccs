<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="ccs squirrel mascot">
  <defs>
    <linearGradient id="fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C67A3E"/>
      <stop offset="100%" stop-color="#8A4A1D"/>
    </linearGradient>
    <linearGradient id="tail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A15A28"/>
      <stop offset="100%" stop-color="#D08648"/>
    </linearGradient>
    <linearGradient id="acorn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C28654"/>
      <stop offset="100%" stop-color="#8A5A30"/>
    </linearGradient>
  </defs>

  <!-- Big bushy S-tail rising from behind body, curling up and over -->
  <path d="M 170 200
           C 215 195, 245 155, 230 110
           C 220 75, 180 55, 150 75
           C 130 90, 135 115, 155 115
           C 170 115, 175 100, 165 95
           C 190 95, 205 120, 195 145
           C 185 170, 160 180, 145 170 Z"
        fill="url(#tail)" stroke="#3B1E08" stroke-width="4" stroke-linejoin="round"/>
  <!-- Tail fur tufts -->
  <path d="M 185 80 Q 200 72 212 85" stroke="#3B1E08" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 210 110 Q 225 115 228 130" stroke="#3B1E08" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 215 150 Q 225 160 215 175" stroke="#3B1E08" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Body (pear shape, sitting upright) -->
  <path d="M 80 225
           C 55 225, 50 180, 70 155
           C 60 135, 70 110, 100 105
           C 135 100, 165 115, 165 150
           C 170 180, 160 215, 140 225 Z"
        fill="url(#fur)" stroke="#3B1E08" stroke-width="4" stroke-linejoin="round"/>
  <!-- Belly patch -->
  <ellipse cx="115" cy="180" rx="32" ry="38" fill="#F4DDB8"/>

  <!-- Head -->
  <circle cx="105" cy="90" r="42" fill="url(#fur)" stroke="#3B1E08" stroke-width="4"/>

  <!-- Ears (tall, pointy) -->
  <path d="M 72 60 L 68 28 L 92 48 Z" fill="#8A4A1D" stroke="#3B1E08" stroke-width="3" stroke-linejoin="round"/>
  <path d="M 138 60 L 142 28 L 118 48 Z" fill="#8A4A1D" stroke="#3B1E08" stroke-width="3" stroke-linejoin="round"/>
  <path d="M 75 55 L 74 38 L 86 48 Z" fill="#E8A57A"/>
  <path d="M 135 55 L 136 38 L 124 48 Z" fill="#E8A57A"/>

  <!-- Cheek blush -->
  <circle cx="72" cy="100" r="8" fill="#E88870" opacity="0.5"/>
  <circle cx="138" cy="100" r="8" fill="#E88870" opacity="0.5"/>

  <!-- Eyes -->
  <circle cx="88" cy="88" r="7" fill="#1A0F06"/>
  <circle cx="122" cy="88" r="7" fill="#1A0F06"/>
  <circle cx="90" cy="85" r="2.2" fill="#fff"/>
  <circle cx="124" cy="85" r="2.2" fill="#fff"/>

  <!-- Nose + mouth -->
  <ellipse cx="105" cy="105" rx="4" ry="3" fill="#1A0F06"/>
  <path d="M 105 109 Q 100 116 94 114" stroke="#1A0F06" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M 105 109 Q 110 116 116 114" stroke="#1A0F06" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Two front teeth (squirrel signature) -->
  <rect x="102" y="111" width="3" height="5" fill="#fff" stroke="#1A0F06" stroke-width="0.8"/>
  <rect x="105" y="111" width="3" height="5" fill="#fff" stroke="#1A0F06" stroke-width="0.8"/>

  <!-- Arms cradling acorn -->
  <path d="M 75 155 Q 80 180 105 182 L 135 182 Q 155 180 155 155 Q 150 178 135 188 L 105 188 Q 85 185 75 155 Z"
        fill="#8A4A1D" stroke="#3B1E08" stroke-width="3" stroke-linejoin="round"/>

  <!-- Acorn held at chest -->
  <g transform="translate(115 185)">
    <ellipse cx="0" cy="12" rx="18" ry="22" fill="url(#acorn)" stroke="#2A1808" stroke-width="3"/>
    <path d="M -20 -2 Q 0 -18 20 -2 Q 18 8 0 10 Q -18 8 -20 -2 Z"
          fill="#4A2D14" stroke="#2A1808" stroke-width="3" stroke-linejoin="round"/>
    <line x1="0" y1="-14" x2="0" y2="-22" stroke="#2A1808" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="-6" cy="12" rx="3" ry="6" fill="#E8C598" opacity="0.55"/>
  </g>

  <!-- Feet peeking out -->
  <ellipse cx="88" cy="228" rx="12" ry="6" fill="#8A4A1D" stroke="#3B1E08" stroke-width="3"/>
  <ellipse cx="135" cy="228" rx="12" ry="6" fill="#8A4A1D" stroke="#3B1E08" stroke-width="3"/>
</svg>
